heroEyebrow: Freelance travel content marketing
heroHeadline: >-
  Travel content that feels like the good old days of going somewhere — and
  still gets them to book.
heroAccent: good old days
standfirstLeftLabel: By the writer
standfirstLeft: >-
  I'm a freelance content marketing consultant for travel and tourism brands of
  every shape — a day-tour operator in Jordan, a New York walking-tour company,
  a European villa collection, a Caribbean sailing line. I write, plan and
  produce content for them: website copy, customer magazines, market reports,
  podcasts, lead magnets.
standfirstRightLabel: The brief, always
standfirstRight: >-
  Whatever the format or the destination, the brief stays the same. Make the
  place feel enchanting, glamorous and worth the journey — then make it easy to
  book. Words that get read, and words that get acted on.
