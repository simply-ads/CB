heroEyebrow: Freelance travel content marketing
heroHeadline: >-
  Smart, practical content marketing for travel brands that want bookings, not
  buzzwords.
heroAccent: bookings, not buzzwords.
standfirstLeftLabel: By the writer
standfirstLeft: >-
  I'm a freelance content marketing consultant for travel and tourism brands. I
  write, plan and produce website copy, email campaigns, customer magazines,
  market reports, podcasts, lead magnets, the lot. Whatever the format, the
  brief stays the same: I produce content that gets seen and acted upon.
standfirstRightLabel: Experience
standfirstRight: >-
  I've spent the last decade running content at Kyero and Urban Adventures
  (Intrepid Travel Group), and writing for Atlas Obscura, Vintage Travel, Cruise
  Nation, Tourpreneur and New York Times Journeys. 


  I've worked with big audiences, small budgets, tight timelines and ambitious
  growth targets. Often all at once.


  If you need a travel content specialist who writes clearly, thinks
  commercially and makes your life significantly easier, please get in touch.
