eyebrow: About
headline: I get travel, and I can help you sell it.
headlineAccent: sell it
portraitImage: null
portraitTag: Portrait · The writer
portraitName: On assignment
portraitCredit: Somewhere between a speedboat in St Lucia and the races in Hong Kong.
body: |-
  I've planned family holidays with toddlers in tow, raucous girls' weekends, and romantic getaways that actually delivered. I've driven the Pacific Coast Highway, taken a speedboat around St Lucia, been chased by camels in Egypt, and won at the races in Hong Kong.

  Which is to say: I know how people travel, what they're looking for, and what makes them book. I understand what travellers need at each stage — inspiration, reassurance, logistics, trust — and how to balance storytelling with conversion.

  Before going fully freelance I spent five years running content at Kyero, Europe's largest overseas property portal. No gloss. No filler. Just smart travel content that does its job.
principles:
  - title: Read the reader
    description: >-
      What travellers need at each stage — inspiration, reassurance, logistics,
      trust — and the words that move them on.
  - title: Earn every claim
    description: >-
      Numbers, client names and real verbs. Specifics build credibility;
      adjectives don't.
  - title: Respect the time
    description: >-
      Short where short works, long only when there's substance. No buzzwords,
      no filler.
